name: release
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  go_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - id: version
        run: echo version=v$(go run . --version) > ${{ github.output }}
      - uses: raviqqe/goreleaser-action@59e628266f05becd1659c0fd9b6be0fa2dab2bc9 # v1.0.0
        with:
          version: ${{ steps.version.outputs.version }}
          snapshot: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker_release:
    needs: go_release
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
        if: github.ref == 'refs/heads/main'
      - id: meta
        run: |
          (
            echo repository=${{ secrets.DOCKER_USER || 'test' }}/muffet
            echo version=$(git tag --points-at | sed s/^v//)
          ) >> ${{ github.output }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          platforms: linux/386,linux/amd64,linux/arm,linux/arm64,linux/riscv64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.repository }}:latest
            ${{ steps.meta.outputs.version && format('{0}:{1}', steps.meta.outputs.repository, steps.meta.outputs.version) || '' }}
      # spell-checker: disable-next-line
      - uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4.0.2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ steps.meta.outputs.repository }}
          short-description: Fast website link checker in Go
        if: github.ref == 'refs/heads/main'
  release:
    needs:
      - go_release
      - docker_release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: for result in ${{ join(needs.*.result, ' ') }}; do [ $result = success ]; done
